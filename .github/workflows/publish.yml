name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # Required for creating GitHub releases
  id-token: write # Required for OIDC trusted publishing

jobs:
  publish-npm:
    name: publish npm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Ensure npm 11.5.1 or later for trusted publishing
      - run: npm install -g npm@latest

      - name: Detect trigger
        id: detect
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "trigger_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "trigger_name=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          fi

      - name: Generate version
        id: version
        run: |
          if [[ "${{ steps.detect.outputs.is_tag }}" == "true" ]]; then
            NPM_VERSION="${GITHUB_REF#refs/tags/v}"
            NPM_TAG="latest"
          else
            LATEST_TAG=$(git describe --tags --abbrev=0)
            BASE_VERSION="${LATEST_TAG#v}"
            GIT_COMMIT=$(git rev-parse --short HEAD)
            COMMITS_SINCE_TAG=$(git rev-list --count HEAD ^${LATEST_TAG} 2>/dev/null || echo "0")
            NPM_VERSION="${BASE_VERSION}-next.${COMMITS_SINCE_TAG}.g${GIT_COMMIT}"
            NPM_TAG="next"
          fi

          echo "version=${NPM_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${NPM_TAG}" >> $GITHUB_OUTPUT

          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json')); p.version='${NPM_VERSION}'; fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');"

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Check if version exists
        id: check-exists
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          if npm view "${PACKAGE_NAME}@${{ steps.version.outputs.version }}" version &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.check-exists.outputs.exists == 'false'
        run: npm publish --tag ${{ steps.version.outputs.tag }} --provenance --access public

      - name: Update dist-tag
        if: steps.check-exists.outputs.exists == 'true' && steps.detect.outputs.is_tag == 'true'
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          npm dist-tag add "${PACKAGE_NAME}@${{ steps.version.outputs.version }}" "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.detect.outputs.is_tag == 'true'
        run: gh release create "${{ steps.detect.outputs.trigger_name }}" --title "${{ steps.detect.outputs.trigger_name }}" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}

  publish-binaries:
    name: build binary (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: publish-npm
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        platform: [linux-x64, linux-arm64, darwin-x64, darwin-arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build:bin:${{ matrix.platform }}

      - name: Upload to release
        run: gh release upload "${{ github.ref_name }}" dist/ghostty-web-server-${{ matrix.platform }} --clobber
        env:
          GH_TOKEN: ${{ github.token }}
